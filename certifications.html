                                ${skillsHTML}
                            </div>
                            <div class="badge-small bg-white flex items-center justify-center">
                                <img src="${cert.badge}" class="max-w-full max-h-full object-contain" alt="Badge">
                            </div>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
            renderNumbers();
        }

        function renderNumbers() {
            const nums = document.getElementById('pagination-numbers');
            nums.innerHTML = '';
            const total = Math.ceil(certifications.length / itemsPerPage);
            for(let i=1; i<=total; i++) {
                const b = document.createElement('button');
                b.innerText = i;
                b.className = `w-10 h-10 rounded-lg transition ${i === currentPage ? 'bg-black text-white dark:bg-white dark:text-black' : 'border border-gray-200 dark:border-[#2a2a2a] hover:bg-gray-100 dark:hover:bg-[#111111]'}`;
                b.onclick = () => { currentPage = i; render(); window.scrollTo(0,0); };
                nums.appendChild(b);
            }
        }

        window.openCertModal = (src) => {
            const modal = document.getElementById('certModal');
            document.getElementById('modalImage').src = src;
            modal.classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        };

        window.closeCertModal = () => {
            const modal = document.getElementById('certModal');
            modal.classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        };

        document.getElementById('prev-btn').onclick = () => { if(currentPage > 1) { currentPage--; render(); window.scrollTo(0,0); } };
        document.getElementById('next-btn').onclick = () => { if(currentPage < Math.ceil(certifications.length/itemsPerPage)) { currentPage++; render(); window.scrollTo(0,0); } };
        
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCertModal(); });

        render();
    </script>
</body>
</html>
