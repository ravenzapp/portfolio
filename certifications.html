        (function() {
            const savedTheme = localStorage.getItem('jrz-theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');

                document.documentElement.classList.remove('dark');

                date:      "Sep 2025",
                skills:    "Visual Communication, Digital Design",
                badge:     "https://1000logos.net/wp-content/uploads/2020/03/Canva-icon.png",
                cert_img:  "https://www.canva.com/en/design-school/certification-award/9c225b6e-1599-4501-b314-5ce36b152a53",
                hyperlink: "https://www.canva.com/en/design-school/certification-award/9c225b6e-1599-4501-b314-5ce36b152a53"
            }

        ]; // end of certifications array

        const itemsPerPage = 6;
        let currentPage = 1;

        function render() {
            const container = document.getElementById('cert-container');
            container.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end   = start + itemsPerPage;
            const pageCerts = certifications.slice(start, end);

            pageCerts.forEach(cert => {
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-[#111111] p-6 rounded-xl border border-gray-200 dark:border-[#2a2a2a] shadow-sm hover-lift';

                const skillsHTML = `<p class="text-[10px] text-gray-400 dark:text-gray-500 mt-2 font-medium uppercase tracking-wider">Top Skills: ${cert.skills}</p>`;

                if (cert.issuer === "Canva") {
                    card.innerHTML = `
                        <div class="flex items-center justify-between gap-4">
                            <div class="min-w-0">
                                <h2 class="text-lg font-bold text-gray-900 dark:text-white leading-tight mb-1">
                                    <a href="${cert.hyperlink}" target="_blank" class="hover:text-gray-900 dark:hover:text-white transition-colors hover:underline underline-offset-4">${cert.title}</a>
                                </h2>
                                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">${cert.issuer} • ${cert.date}</p>
                                ${skillsHTML}
                            </div>
                            <div class="badge-small bg-white flex items-center justify-center">
                                <img src="${cert.badge}" class="max-w-full max-h-full object-contain" alt="Badge">
                            </div>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="cert-img-container cursor-pointer" onclick="openCertModal('${cert.cert_img}')">
                            <img src="${cert.cert_img}" class="cert-main-img" alt="${cert.title}">
                        </div>
                        <div class="flex items-start justify-between gap-4">
                            <div class="min-w-0">
                                <h2 class="text-lg font-bold text-gray-900 dark:text-white leading-tight mb-1">
                                    <a href="${cert.hyperlink}" target="_blank" class="hover:text-gray-900 dark:hover:text-white transition-colors hover:underline underline-offset-4">${cert.title}</a>
                                </h2>
                                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">${cert.issuer} • ${cert.date}</p>
                                ${skillsHTML}
                            </div>
                            <div class="badge-small bg-white flex items-center justify-center">
                                <img src="${cert.badge}" class="max-w-full max-h-full object-contain" alt="Badge">
                            </div>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
            renderNumbers();
        }

        function renderNumbers() {
            const nums  = document.getElementById('pagination-numbers');
            nums.innerHTML = '';
            const total = Math.ceil(certifications.length / itemsPerPage);
            for (let i = 1; i <= total; i++) {
                const b = document.createElement('button');
                b.innerText   = i;
                b.className   = `w-10 h-10 rounded-lg transition ${i === currentPage ? 'bg-black text-white dark:bg-white dark:text-black' : 'border border-gray-200 dark:border-[#2a2a2a] hover:bg-gray-100 dark:hover:bg-[#111111]'}`;
                b.onclick     = () => { currentPage = i; render(); window.scrollTo(0, 0); };
                nums.appendChild(b);
            }
        }

        window.openCertModal = (src) => {
            const modal = document.getElementById('certModal');
            document.getElementById('modalImage').src = src;
            modal.classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        };

        window.closeCertModal = () => {
            const modal = document.getElementById('certModal');
            modal.classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        };

        document.getElementById('prev-btn').onclick = () => {
            if (currentPage > 1) { currentPage--; render(); window.scrollTo(0, 0); }
        };
        document.getElementById('next-btn').onclick = () => {
            if (currentPage < Math.ceil(certifications.length / itemsPerPage)) { currentPage++; render(); window.scrollTo(0, 0); }
        };

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCertModal(); });

        render();

    </script>
</body>
</html>
